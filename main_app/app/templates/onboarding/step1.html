{% extends "layouts/public.html" %}

{% block title %}Set Up Your Organization - {{ platform_name }}{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-6">
    <div class="w-full max-w-lg">
        <!-- Progress -->
        <div class="flex items-center justify-center gap-3 mb-10">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-brand-600 text-white flex items-center justify-center text-sm font-semibold">1</div>
                <span class="text-sm font-medium text-surface-900">Organization</span>
            </div>
            <div class="w-12 h-px bg-surface-300"></div>
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-surface-200 text-surface-500 flex items-center justify-center text-sm font-semibold">2</div>
                <span class="text-sm font-medium text-surface-400">Choose Plan</span>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-surface-200 p-8 shadow-sm">
            <h2 class="text-xl font-bold text-surface-900 mb-2">Tell us about your organization</h2>
            <p class="text-sm text-surface-500 mb-6">This helps us personalize your experience.</p>

            <form method="POST" action="{{ url_for('public.onboarding_organization') }}" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div>
                    <label class="block text-sm font-medium text-surface-700 mb-1.5">Organization Name</label>
                    <input type="text" name="org_name" required class="w-full px-4 py-2.5 rounded-lg border border-surface-300 text-sm focus:ring-2 focus:ring-brand-600/20 focus:border-brand-600 outline-none transition" placeholder="Acme Corp">
                </div>
                <div>
                    <label class="block text-sm font-medium text-surface-700 mb-1.5">Industry <span class="text-surface-400">(optional)</span></label>
                    <select name="industry" class="w-full px-4 py-2.5 rounded-lg border border-surface-300 text-sm focus:ring-2 focus:ring-brand-600/20 focus:border-brand-600 outline-none transition">
                        <option value="">Select an industry</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Real Estate">Real Estate</option>
                        <option value="Legal">Legal</option>
                        <option value="Financial Services">Financial Services</option>
                        <option value="Retail / E-Commerce">Retail / E-Commerce</option>
                        <option value="Home Services">Home Services</option>
                        <option value="Technology">Technology</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <button type="submit" class="w-full py-2.5 rounded-lg bg-brand-600 text-white font-semibold hover:bg-brand-700 transition shadow-lg shadow-brand-600/25">
                    Continue
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
