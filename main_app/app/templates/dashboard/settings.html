{% extends "layouts/dashboard.html" %}
{% block page_title %}Settings{% endblock %}
{% block content %}
<div class="max-w-2xl">
    <div class="bg-white rounded-xl border border-surface-200 p-6">
        <h2 class="text-sm font-semibold text-surface-900 mb-4">Organization Settings</h2>
        <form method="POST" action="{{ url_for('dashboard.settings') }}" class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-sm font-medium text-surface-700 mb-1.5">Organization Name</label>
                <input type="text" name="org_name" value="{{ org.name if org else '' }}" class="w-full px-4 py-2.5 rounded-lg border border-surface-300 text-sm focus:ring-2 focus:ring-brand-600/20 focus:border-brand-600 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-surface-700 mb-1.5">Industry</label>
                <input type="text" name="industry" value="{{ org.industry if org else '' }}" class="w-full px-4 py-2.5 rounded-lg border border-surface-300 text-sm focus:ring-2 focus:ring-brand-600/20 focus:border-brand-600 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-surface-700 mb-1.5">Timezone</label>
                <input type="text" name="timezone" value="{{ org.timezone if org else 'UTC' }}" class="w-full px-4 py-2.5 rounded-lg border border-surface-300 text-sm focus:ring-2 focus:ring-brand-600/20 focus:border-brand-600 outline-none transition">
            </div>
            <div class="flex justify-end">
                <button type="submit" class="px-5 py-2.5 rounded-lg bg-brand-600 text-white text-sm font-semibold hover:bg-brand-700 transition">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
