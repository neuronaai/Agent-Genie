<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ platform_name }}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50:  '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '{{ branding.primary_color if branding else "#6366f1" }}',
                            600: '{{ branding.accent_color if branding else "#4f46e5" }}',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                        },
                        surface: {
                            50:  '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        },
                        navy: {
                            800: '#172042',
                            900: '#0d1530',
                            950: '#080e20',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    boxShadow: {
                        'premium': '0 1px 3px 0 rgba(0, 0, 0, 0.04), 0 1px 2px -1px rgba(0, 0, 0, 0.03)',
                        'premium-md': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.03)',
                        'premium-lg': '0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.03)',
                        'premium-xl': '0 20px 50px -12px rgba(0, 0, 0, 0.12)',
                        'glow-brand': '0 0 30px -5px rgba(99, 102, 241, 0.3)',
                        'glow-brand-lg': '0 0 60px -10px rgba(99, 102, 241, 0.4)',
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }

        /* Glass effects */
        .glass { backdrop-filter: blur(20px) saturate(180%); background: rgba(255,255,255,0.85); }
        .glass-dark { backdrop-filter: blur(20px) saturate(180%); background: rgba(15,23,42,0.85); }

        /* Gradients */
        .gradient-brand { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%); }
        .gradient-brand-subtle { background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 50%, #faf5ff 100%); }
        .gradient-hero { background: linear-gradient(160deg, #080e20 0%, #0d1530 30%, #172042 60%, #1e1b4b 100%); }
        .gradient-cta { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #9333ea 100%); }
        .gradient-dark-section { background: linear-gradient(160deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); }

        /* Card effects */
        .card-premium {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-premium:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.12);
            border-color: #c7d2fe;
        }

        /* Sidebar */
        .sidebar-link {
            transition: all 0.15s ease;
            border-radius: 10px;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(99,102,241,0.08);
            color: #4f46e5;
        }

        /* Subtle border glow */
        .border-glow { border: 1px solid rgba(99,102,241,0.2); box-shadow: 0 0 20px -5px rgba(99,102,241,0.1); }

        /* Smooth scrolling */
        html { scroll-behavior: smooth; }

        /* Selection color */
        ::selection { background: #c7d2fe; color: #312e81; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="h-full bg-surface-50 text-surface-800 antialiased">
    {% block body %}{% endblock %}

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div id="flash-container" class="fixed top-4 right-4 z-50 space-y-2 max-w-sm">
        {% for category, message in messages %}
        <div class="flash-msg flex items-center gap-3 px-5 py-3.5 rounded-xl shadow-premium-lg border
            {% if category == 'success' %}bg-emerald-50 border-emerald-200 text-emerald-800
            {% elif category == 'danger' %}bg-red-50 border-red-200 text-red-800
            {% elif category == 'warning' %}bg-amber-50 border-amber-200 text-amber-800
            {% else %}bg-blue-50 border-blue-200 text-blue-800{% endif %}">
            <span class="text-sm font-medium">{{ message }}</span>
            <button onclick="this.parentElement.remove()" class="ml-auto text-current opacity-50 hover:opacity-100">&times;</button>
        </div>
        {% endfor %}
    </div>
    <script>setTimeout(()=>{document.querySelectorAll('.flash-msg').forEach(el=>{el.style.transition='opacity 0.5s';el.style.opacity='0';setTimeout(()=>el.remove(),500)})},5000)</script>
    {% endif %}
    {% endwith %}

    {% block scripts %}{% endblock %}
</body>
</html>
