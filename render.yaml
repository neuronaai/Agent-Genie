# ============================================================
# AgentGenie — Render Blueprint (render.yaml)
# ============================================================
# This file MUST live at the repository root so Render can
# auto-detect it.  Each service specifies an explicit rootDir
# so Render builds from the correct subdirectory.
#
# Repository layout:
#   render.yaml              ← this file (repo root)
#   main_app/                ← Flask web app + Celery worker
#   services/openai_brain/   ← FastAPI brain microservice
#
# Deploy with: https://render.com/deploy
#
# Services:
#   - web:    Flask + Gunicorn (main application)
#   - brain:  FastAPI + Uvicorn (OpenAI agent generation)
#   - worker: Celery worker (post-call tasks, async jobs)
#
# Infrastructure:
#   - PostgreSQL database
#   - Redis (Celery broker + result backend)
#
# On every deploy, the preDeployCommand runs:
#   1. flask db upgrade   (apply migrations)
#   2. python manage.py seed (insert-missing-only)
# ============================================================

services:
  # ── Web Service ──────────────────────────────────────────
  - type: web
    name: agentgenie-web
    runtime: python
    plan: starter              # $7/mo — 512MB RAM, 0.5 CPU
    rootDir: main_app
    buildCommand: pip install -r requirements.txt
    startCommand: >
      gunicorn wsgi:app
      --bind 0.0.0.0:$PORT
      --workers 2
      --threads 2
      --timeout 120
      --max-requests 1000
      --max-requests-jitter 50
    preDeployCommand: bash scripts/release.sh
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: wsgi.py
      - key: SECRET_KEY
        generateValue: true
      - key: CREDENTIAL_ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: agentgenie-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: agentgenie-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: agentgenie-redis
          type: redis
          property: connectionString
      - key: PLATFORM_NAME
        value: AgentGenie
      - key: PLATFORM_DOMAIN
        sync: false
      # --- Provider keys (set manually in Render dashboard) ---
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RETELL_API_KEY
        sync: false
      - key: RETELL_WEBHOOK_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: OPENAI_API_KEY_CUSTOM
        sync: false
      - key: OPENAI_BRAIN_URL
        sync: false
      - key: BRAIN_SERVICE_TOKEN
        fromService:
          name: agentgenie-brain
          type: web
          envVarKey: BRAIN_SERVICE_TOKEN
      # --- Gmail SMTP ---
      - key: GMAIL_SMTP_USER
        sync: false
      - key: GMAIL_SMTP_PASSWORD
        sync: false
      - key: GMAIL_SMTP_FROM
        sync: false
      - key: GMAIL_SMTP_FROM_NAME
        value: AgentGenie
      - key: NOTIFICATION_EMAIL_PROVIDER
        value: gmail_smtp
      # --- Feature Flags ---
      - key: FEATURE_PARTNER_PROGRAM
        value: "false"
      - key: FEATURE_DFY
        value: "false"
      - key: FEATURE_CAMPAIGNS
        value: "false"

  # ── OpenAI Brain Microservice ────────────────────────────
  - type: web
    name: agentgenie-brain
    runtime: python
    plan: starter
    rootDir: services/openai_brain
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY_CUSTOM
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: OPENAI_API_KEY_CUSTOM
      - key: BRAIN_SERVICE_TOKEN
        generateValue: true
      - key: BRAIN_MOCK_MODE
        value: "false"

  # ── Celery Worker ────────────────────────────────────────
  - type: worker
    name: agentgenie-worker
    runtime: python
    plan: starter              # $7/mo — 512MB RAM, 0.5 CPU
    rootDir: main_app
    buildCommand: pip install -r requirements.txt
    startCommand: >
      celery -A app.celery_app:celery_app worker
      --beat
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=100
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: wsgi.py
      - key: SECRET_KEY
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: SECRET_KEY
      - key: CREDENTIAL_ENCRYPTION_KEY
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: CREDENTIAL_ENCRYPTION_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: agentgenie-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: agentgenie-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: agentgenie-redis
          type: redis
          property: connectionString
      # Worker needs provider keys for executing tools
      - key: SENDGRID_API_KEY
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: SENDGRID_API_KEY
      - key: SENDGRID_FROM_EMAIL
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: SENDGRID_FROM_EMAIL
      - key: TWILIO_ACCOUNT_SID
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: TWILIO_ACCOUNT_SID
      - key: TWILIO_AUTH_TOKEN
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: TWILIO_AUTH_TOKEN
      - key: TWILIO_PHONE_NUMBER
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: TWILIO_PHONE_NUMBER
      - key: GOOGLE_CLIENT_ID
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: GOOGLE_CLIENT_ID
      - key: GOOGLE_CLIENT_SECRET
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: GOOGLE_CLIENT_SECRET
      - key: STRIPE_SECRET_KEY
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: STRIPE_SECRET_KEY
      - key: RETELL_API_KEY
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: RETELL_API_KEY
      # Worker needs Gmail SMTP for sending notifications from async tasks
      - key: GMAIL_SMTP_USER
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: GMAIL_SMTP_USER
      - key: GMAIL_SMTP_PASSWORD
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: GMAIL_SMTP_PASSWORD
      - key: GMAIL_SMTP_FROM
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: GMAIL_SMTP_FROM
      - key: GMAIL_SMTP_FROM_NAME
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: GMAIL_SMTP_FROM_NAME
      - key: NOTIFICATION_EMAIL_PROVIDER
        value: gmail_smtp

  # ── Redis ────────────────────────────────────────────────
  - type: redis
    name: agentgenie-redis
    plan: free                 # Free tier — 25MB, sufficient for task queue
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []            # Only allow internal access

# ── PostgreSQL Database ──────────────────────────────────
databases:
  - name: agentgenie-db
    plan: basic-256mb          # $7/mo — 256MB RAM, 1GB storage, 100 connections
    databaseName: agentgenie
    user: agentgenie
    postgresMajorVersion: "16"
