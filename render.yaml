# ============================================================
# AgentGenie — Render Blueprint (render.yaml)
# ============================================================

services:
  # ----------------------------------------------------------
  # Web
  # ----------------------------------------------------------
  - type: web
    name: agentgenie-web
    runtime: python
    plan: starter
    rootDir: main_app
    buildCommand: pip install -r requirements.txt
    startCommand: >
      gunicorn wsgi:app
      --bind 0.0.0.0:$PORT
      --workers 2
      --threads 2
      --timeout 120
      --max-requests 1000
      --max-requests-jitter 50
    preDeployCommand: bash scripts/release.sh
    healthCheckPath: /login
    autoDeploy: true

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: wsgi.py

      # Core secrets
      - key: SECRET_KEY
        generateValue: true
      - key: CREDENTIAL_ENCRYPTION_KEY
        generateValue: true

      # Database / Redis
      - key: DATABASE_URL
        fromDatabase:
          name: agentgenie-db
          property: connectionString

      - key: CELERY_BROKER_URL
        fromService:
          name: agentgenie-redis
          type: redis
          property: connectionString

      - key: CELERY_RESULT_BACKEND
        fromService:
          name: agentgenie-redis
          type: redis
          property: connectionString

      # Platform
      - key: PLATFORM_NAME
        value: AgentGenie
      - key: PLATFORM_DOMAIN
        sync: false

      # AI Integration (IMPORTANT — KEEP THIS)
      - key: OPENAI_API_KEY_CUSTOM
        sync: false

      - key: OPENAI_BRAIN_URL
        sync: false

      # 🔥 FIXED — NO AUTO-INJECTION
      - key: BRAIN_SERVICE_TOKEN
        sync: false

      # Optional integrations (safe)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RETELL_API_KEY
        sync: false
      - key: RETELL_WEBHOOK_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false

      # Gmail SMTP
      - key: GMAIL_SMTP_USER
        sync: false
      - key: GMAIL_SMTP_PASSWORD
        sync: false
      - key: GMAIL_SMTP_FROM
        sync: false
      - key: GMAIL_SMTP_FROM_NAME
        value: AgentGenie
      - key: NOTIFICATION_EMAIL_PROVIDER
        value: gmail_smtp

      # Feature flags
      - key: FEATURE_PARTNER_PROGRAM
        value: "false"
      - key: FEATURE_DFY
        value: "false"
      - key: FEATURE_CAMPAIGNS
        value: "false"

  # ----------------------------------------------------------
  # Brain
  # ----------------------------------------------------------
  - type: web
    name: agentgenie-brain
    runtime: python
    plan: starter
    rootDir: services/openai_brain
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

      # ✅ Correct: brain gets OpenAI key from web
      - key: OPENAI_API_KEY_CUSTOM
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: OPENAI_API_KEY_CUSTOM

      # 🔥 FIXED
      - key: BRAIN_SERVICE_TOKEN
        sync: false

      - key: BRAIN_MOCK_MODE
        value: "false"

  # ----------------------------------------------------------
  # Worker
  # ----------------------------------------------------------
  - type: worker
    name: agentgenie-worker
    runtime: python
    plan: starter
    rootDir: main_app
    buildCommand: pip install -r requirements.txt
    startCommand: >
      celery -A app.celery_app:celery_app worker
      --beat
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=100
    autoDeploy: true

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: wsgi.py

      # Shared secrets
      - key: SECRET_KEY
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: SECRET_KEY

      - key: CREDENTIAL_ENCRYPTION_KEY
        fromService:
          name: agentgenie-web
          type: web
          envVarKey: CREDENTIAL_ENCRYPTION_KEY

      # DB / Redis
      - key: DATABASE_URL
        fromDatabase:
          name: agentgenie-db
          property: connectionString

      - key: CELERY_BROKER_URL
        fromService:
          name: agentgenie-redis
          type: redis
          property: connectionString

      - key: CELERY_RESULT_BACKEND
        fromService:
          name: agentgenie-redis
          type: redis
          property: connectionString

      # Optional worker integrations
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RETELL_API_KEY
        sync: false
      - key: GMAIL_SMTP_USER
        sync: false
      - key: GMAIL_SMTP_PASSWORD
        sync: false
      - key: GMAIL_SMTP_FROM
        sync: false
      - key: GMAIL_SMTP_FROM_NAME
        value: AgentGenie
      - key: NOTIFICATION_EMAIL_PROVIDER
        value: gmail_smtp

  # ----------------------------------------------------------
  # Redis
  # ----------------------------------------------------------
  - type: redis
    name: agentgenie-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: agentgenie-db
    plan: basic-256mb
    databaseName: agentgenie
    user: agentgenie
    postgresMajorVersion: "16"
